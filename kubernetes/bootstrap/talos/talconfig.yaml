# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.9.0
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.32.0

clusterName: "home-kubernetes"
endpoint: https://192.168.8.10:6443

clusterPodNets:
  - "10.69.0.0/16"
clusterSvcNets:
  - "10.96.0.0/16"

additionalApiServerCertSans: &sans
  - "192.168.8.10"
  - "127.0.0.1"
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "ktmb1-g-srv-008"
    ipAddress: "192.168.8.2"
    installDisk: "/dev/sdb"
    talosImageURL: factory.talos.dev/installer/f640f8bd3588244df5fce68abb56a7326029113aee4d21fa915e2a2dbcf06f5e
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "54:bf:64:7a:dc:4d"
        dhcp: false
        addresses:
          - "192.168.8.2/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.8.1"
        mtu: 1500
        vip:
          ip: "192.168.8.10"
  - hostname: "ktmb1-g-srv-009"
    ipAddress: "192.168.8.3"
    installDisk: "/dev/nvme0n1"
    talosImageURL: factory.talos.dev/installer/f640f8bd3588244df5fce68abb56a7326029113aee4d21fa915e2a2dbcf06f5e
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "14:b3:1f:29:c0:08"
        dhcp: false
        addresses:
          - "192.168.8.3/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.8.1"
        mtu: 1500
        vip:
          ip: "192.168.8.10"
  - hostname: "ktmb1-g-srv-010"
    ipAddress: "192.168.8.4"
    installDisk: "/dev/nvme0n1"
    talosImageURL: factory.talos.dev/installer/f640f8bd3588244df5fce68abb56a7326029113aee4d21fa915e2a2dbcf06f5e
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "14:b3:1f:29:c3:d7"
        dhcp: false
        addresses:
          - "192.168.8.4/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.8.1"
        mtu: 1500
        vip:
          ip: "192.168.8.10"

# Global patches
patches:
  - "@./patches/global/cluster-discovery.yaml"
  - "@./patches/global/containerd.yaml"
  - "@./patches/global/disable-search-domain.yaml"
  - "@./patches/global/dns.yaml"
  - "@./patches/global/hostdns.yaml"
  - "@./patches/global/kubelet.yaml"
  - "@./patches/global/ntp.yaml"
  - "@./patches/global/openebs-local.yaml"
  - "@./patches/global/sysctl.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/api-access.yaml"
    - "@./patches/controller/cluster.yaml"
    - "@./patches/controller/disable-admission-controller.yaml"
    - "@./patches/controller/etcd.yaml"

