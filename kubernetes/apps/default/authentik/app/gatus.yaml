---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-gatus-ep
  labels:
    gatus.io/enabled: "true"
data:
  config.yaml: |
    endpoints:
      - name: sso
        group: infrastructure-services
        url: http://authentik-server.default.svc.cluster.local
        interval: 1m
        ui:
          hide-url: true
          hide-hostname: true
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: pushover
