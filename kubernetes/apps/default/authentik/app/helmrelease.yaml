---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: 2024.6.1
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
      interval: 5m
  values:
    global:
      podAnnotations:
        secret.reloader.stakater.com/reload: &secret authentik-secret
      deploymentStrategy:
        type: RollingUpdate
      envFrom:
        - secretRef:
            name: *secret
    authentik:
      postgresql:
        host: postgres16-rw.database.svc.cluster.local
      redis:
        master:
          persistence:
            size: 1Gi
    server:
      volumes:
        - name: cert-manager-certs
          secret:
            secretName: alexeym-net-production-tls
      volumeMounts:
        - name: cert-manager-certs
          mountPath: /certs
          readOnly: true
      replicas: 1
      initContainers:
        - name: init-db
          image: ghcr.io/onedr0p/postgres-init:16.3
          envFrom:
            - secretRef:
                name: *secret
      resources:
        requests:
          cpu: 50m
          memory: 500Mi
        limits:
          memory: 800Mi
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      ingress:
        enabled: true
        ingressClassName: internal
        hosts:
          - sso.${SECRET_DOMAIN}
        https: false
    worker:
      volumes:
        - name: cert-manager-certs
          secret:
            secretName: alexeym-net-production-tls
      volumeMounts:
        - name: cert-manager-certs
          mountPath: /certs
          readOnly: true

      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 500Mi
        limits:
          memory: 1200Mi
    redis:
      enabled: true
