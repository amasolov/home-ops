---
apiVersion: v1
kind: Service
metadata:
  name: authentik-ldap
  annotations:
    external-dns.alpha.kubernetes.io/hostname: ldap.alexeym.net
    io.cilium/lb-ipam-ips: 192.168.6.10
spec:
  type: LoadBalancer
  ports:
    - name: ldap
      port: 389
      protocol: TCP
      targetPort: 389
    - name: ldap-ssl
      port: 636
      protocol: TCP
      targetPort: 636
  selector:
    goauthentik.io/outpost-name: ktmb1ldap
