---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: adguard
spec:
  refreshInterval: 4h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: adguard-secret
    template:
      mergePolicy: Merge
      engineVersion: v2
      data:
        LOG_LEVEL: "info"
        CRON: "0 */2 * * *"
        RUN_ON_START: "true"
        API_PORT: "8080"

  dataFrom:
    - extract:
        key: adguard
