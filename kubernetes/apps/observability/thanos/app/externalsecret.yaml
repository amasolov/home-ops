---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: thanos
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: thanos-secret
    template:
      engineVersion: v2
  dataFrom:
    - extract:
        key: thanos
    - extract:
        key: minio
    - extract:
        key: redis
