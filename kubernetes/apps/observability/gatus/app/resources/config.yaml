---
# Note: Gatus vars should be escaped with $${VAR_NAME} to avoid interpolation by Flux
web:
  port: $${WEB_PORT}
storage:
  type: postgres
  path: postgres://$${INIT_POSTGRES_USER}:$${INIT_POSTGRES_PASS}@$${INIT_POSTGRES_HOST}:5432/$${INIT_POSTGRES_DBNAME}?sslmode=disable
  caching: true
metrics: true
debug: false
ui:
  title: Status | KTMB1
  header: KTMB1 Status
alerting:
  pushover:
    title: Gatus (Kubernetes)
    application-token: $${PUSHOVER_TOKEN}
    user-key: $${PUSHOVER_USER_KEY}
    priority: 1
    default-alert:
      description: health-check failed
      send-on-resolved: true
      failure-threshold: 3
      success-threshold: 3
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m
endpoints:
  - name: flux-webhook
    group: external
    url: https://flux-webhook.alexeym.net
    interval: 1m
    client:
      dns-resolver: tcp://1.1.1.1:53
    conditions:
      - "[STATUS] == 404"
    alerts:
      - type: pushover
  - name: home-assistant
    group: smart-home
    url: https://homeassistant.alexeym.net
    interval: 1m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: pushover

  - name: ktmb1-g-rt-001 (main router)
    group: network-devices
    url: https://ktmb1-g-rt-001.infrastructure.home.alexeym.net
    interval: 1m
    client:
      dns-resolver: tcp://192.168.2.43:53
      insecure: true
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: pushover

  - name: ktmb1-g-sw-001 (main switch)
    group: network-devices
    url: tcp://ktmb1-g-sw-001.infrastructure.home.alexeym.net:22
    interval: 1m
    client:
      insecure: true
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: pushover

  - name: ktmb1-t-sw-001 (office switch)
    group: network-devices
    url: tcp://ktmb1-t-sw-001.infrastructure.home.alexeym.net:22
    interval: 1m
    client:
      insecure: true
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: pushover

  - name: ktmb1-g-wap-001 (garage wireless access point)
    group: network-devices
    url: tcp://ktmb1-g-wap-001.infrastructure.home.alexeym.net:22
    interval: 1m
    client:
      insecure: true
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: pushover

  - name: ktmb1-g-srv-001 (philips hue hub)
    group: smart-home
    url: tcp://ktmb1-g-srv-001.iot.home.alexeym.net:80
    interval: 1m
    client:
      insecure: true
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: pushover

  - name: gatus
    group: applications
    url: http://status.alexeym.net
    interval: 1m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: pushover
